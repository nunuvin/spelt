<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelt</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #030712;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app {
      width: min(760px, 100%);
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      gap: 14px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 10px;
      gap: 12px;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.04em; }
    button {
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    .reset { background: #1f2937; padding: 8px 12px; font-size: 12px; }
    .lists {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .lists button {
      background: #111827;
      border: 1px solid #374151;
      padding: 8px 12px;
      white-space: nowrap;
      font-size: 12px;
      text-transform: uppercase;
    }
    .lists button.active { background: #4f46e5; border-color: #6366f1; }
    .status {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #93c5fd;
    }
    .grid {
      margin: 0 auto;
      display: grid;
      gap: 6px;
    }
    .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .cell {
      width: clamp(50px, 12vw, 62px);
      height: clamp(50px, 12vw, 62px);
      border: 2px solid #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 800;
      text-transform: uppercase;
    }
    .filled { border-color: #9ca3af; }
    .green { background: #16a34a; border-color: #16a34a; }
    .yellow { background: #ca8a04; border-color: #ca8a04; }
    .gray { background: #374151; border-color: #374151; }
    .wasted { background: #111827; opacity: 0.25; }
    .keyboard { margin-top: auto; display: grid; gap: 8px; }
    .kbd-row { display: grid; grid-template-columns: repeat(20, minmax(0, 1fr)); gap: 6px; }
    .key {
      grid-column: span 2;
      height: 46px;
      background: #4b5563;
      font-size: 12px;
      text-transform: uppercase;
    }
    .key.large { grid-column: span 4; }
    .key.hint { background: #b45309; }
    .key.gray { background: #111827; color: #9ca3af; }
    .key.green { background: #16a34a; }
    .key.yellow { background: #ca8a04; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    .overlay.show { display: flex; }
    .panel {
      width: min(92vw, 360px);
      padding: 24px;
      border: 1px solid #374151;
      border-radius: 16px;
      background: #111827;
      text-align: center;
    }
    .title { margin: 0 0 8px; font-size: 34px; font-weight: 900; }
    .victory { color: #22c55e; }
    .defeat { color: #ef4444; }
    .subtle { color: #9ca3af; }
    .word { font-size: 28px; letter-spacing: 0.2em; font-weight: 900; }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <h1>WORDLE PRO</h1>
      <button class="reset" id="resetBtn">RESET</button>
    </div>
    <div class="lists" id="listButtons"></div>
    <div class="status" id="status"></div>
    <div class="grid" id="grid"></div>
    <div class="keyboard" id="keyboard"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2 class="title" id="resultTitle"></h2>
      <div id="resultText"></div>
      <p class="subtle" id="nextRound"></p>
    </div>
  </div>

  <script>
    const INTERNAL_WORD_LIST = [
      "about","above","acute","adapt","admit","after","again","agent","agree","ahead","alarm","album","alert","alike","alive","allow","alone","along","alter","among",
      "anger","angle","angry","apart","apple","apply","arena","argue","arise","array","aside","asset","audio","audit","avoid","award","aware","awful","badly","baker",
      "basic","basis","beach","beard","beast","begin","being","below","bench","birth","black","blade","blank","blast","blend","block","blood","board","boast","bonus",
      "boost","bound","brain","brake","brand","brave","bread","break","brief","bring","broad","brown","build","built","buyer","cable","camel","canal","candy","carry",
      "catch","cause","chain","chair","chalk","chart","chase","cheap","check","chest","chief","child","china","choir","civil","claim","class","clean","clear","climb",
      "clock","close","cloud","coach","coast","color","count","court","cover","craft","crane","crash","cream","crime","cross","crowd","crown","curve","cycle","daily",
      "dance","death","debut","delay","depth","dirty","doubt","draft","drama","dream","dress","drift","drill","drink","drive","drove","dying","eager","early","earth",
      "eight","elite","empty","enemy","enjoy","enter","entry","equal","error","event","every","exact","exist","extra","faith","false","fault","fiber","field","fifth",
      "fifty","fight","final","first","fixed","flash","fleet","floor","fluid","focus","force","forth","forty","forum","found","frame","frank","fraud","fresh","front",
      "fruit","fully","funny","giant","glass","globe","glory","glove","grace","grade","grand","grant","graph","grass","great","green","greet","gross","group","grown",
      "guard","guess","guest","guide","habit","happy","heart","heavy","hence","hobby","hotel","house","human","ideal","image","index","inner","input","issue","joint",
      "judge","juice","knife","knock","label","labor","large","laser","later","laugh","layer","learn","lease","least","leave","legal","lemon","level","light","limit",
      "links","liver","local","logic","loose","lower","lucky","lunch","lying","magic","major","maker","march","match","maybe","mayor","meant","media","metal","might",
      "minor","minus","mixed","model","money","month","moral","motor","mount","mouse","mouth","movie","music","newly","night","noise","north","noted","novel","nurse",
      "occur","ocean","offer","often","order","other","ought","outer","owner","panel","paper","party","peace","phase","phone","photo","piece","pilot","pitch","place",
      "plain","plane","plant","plate","point","pound","power","press","price","pride","prime","print","prior","prize","proof","proud","prove","queen","quick","quiet",
      "quite","radio","raise","range","rapid","ratio","reach","ready","refer","right","rival","river","rough","round","route","royal","rural","scale","scene","scope",
      "score","sense","serve","seven","shade","shaft","shake","share","sharp","sheet","shelf","shell","shift","shirt","shock","shoot","short","shown","sight","since",
      "sixth","sixty","sized","skill","sleep","slide","small","smart","smile","smoke","solid","solve","sound","south","space","spare","speak","speed","spend","spent",
      "split","spoke","sport","staff","stage","stake","stand","start","state","steam","steel","stick","still","stock","stone","stood","store","storm","story","strip",
      "stuck","study","stuff","style","sugar","suite","super","sweet","table","taken","taste","teach","teeth","terry","theme","there","thick","thing","think","third",
      "those","three","throw","tight","times","tired","title","today","topic","total","touch","tough","tower","track","trade","train","treat","trend","trial","tried",
      "tries","truck","trust","truth","twice","under","undue","union","unity","until","upper","upset","urban","usage","usual","valid","value","video","virus","visit",
      "vital","voice","waste","watch","water","wheel","where","which","while","white","whole","whose","woman","world","worry","worth","would","wound","write","wrong",
      "yield","young","youth"
    ];

    const EXTERNAL_LISTS = ["knuth_5k.txt", "16k.txt"];
    const KEYBOARD_ROWS = [
      ["q","w","e","r","t","y","u","i","o","p"],
      ["a","s","d","f","g","h","j","k","l"],
      ["Enter","z","x","c","v","b","n","m","Backspace","Hint"]
    ];

    const state = {
      listType: "standard",
      cachedLists: { standard: INTERNAL_WORD_LIST },
      targetWord: "",
      guesses: [],
      currentGuess: "",
      gameStatus: "playing",
      countdown: null,
      loading: false,
      hintCount: 0,
      messageTimer: null,
      countdownTimer: null
    };

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");
    const keyboardEl = document.getElementById("keyboard");
    const listButtonsEl = document.getElementById("listButtons");
    const resetBtn = document.getElementById("resetBtn");
    const overlay = document.getElementById("overlay");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");
    const nextRound = document.getElementById("nextRound");

    function formatListLabel(filename) {
      return filename.split(".")[0].replace(/[_-]/g, " ").toUpperCase();
    }

    function activeList() {
      return state.cachedLists[state.listType] || INTERNAL_WORD_LIST;
    }

    function showMessage(msg, duration = 2000) {
      clearTimeout(state.messageTimer);
      statusEl.textContent = msg || "";
      if (duration > 0) {
        state.messageTimer = setTimeout(() => {
          statusEl.textContent = "";
        }, duration);
      }
    }

    function getGuessResult(guess, target) {
      if (guess === "_____") return Array(5).fill("wasted");
      const result = Array(5).fill("gray");
      const targetArr = target.split("");
      const guessArr = guess.split("");

      for (let index = 0; index < 5; index += 1) {
        if (guessArr[index] === targetArr[index]) {
          result[index] = "green";
          guessArr[index] = null;
          targetArr[index] = null;
        }
      }

      for (let index = 0; index < 5; index += 1) {
        if (guessArr[index] !== null) {
          const found = targetArr.indexOf(guessArr[index]);
          if (found !== -1) {
            result[index] = "yellow";
            targetArr[found] = null;
          }
        }
      }
      return result;
    }

    function letterStatuses() {
      const map = {};
      for (const guess of state.guesses) {
        if (guess === "_____") continue;
        const scores = getGuessResult(guess, state.targetWord);
        guess.split("").forEach((char, index) => {
          const score = scores[index];
          const current = map[char];
          if (score === "green") map[char] = "green";
          else if (score === "yellow" && current !== "green") map[char] = "yellow";
          else if (score === "gray" && !current) map[char] = "gray";
        });
      }
      return map;
    }

    function updateOverlay() {
      if (state.countdown === null) {
        overlay.classList.remove("show");
        return;
      }
      overlay.classList.add("show");
      const won = state.gameStatus === "won";
      resultTitle.textContent = won ? "VICTORY" : "DEFEAT";
      resultTitle.className = `title ${won ? "victory" : "defeat"}`;
      if (won) {
        const attempts = state.guesses.filter(word => word !== "_____").length;
        resultText.innerHTML = `<p class="subtle">Found in <strong>${attempts}</strong> attempts!</p>`;
      } else {
        resultText.innerHTML = `<p class="subtle">The word was</p><div class="word">${state.targetWord}</div>`;
      }
      nextRound.textContent = `Next round in ${state.countdown}s...`;
    }

    function renderGrid() {
      gridEl.innerHTML = "";
      for (let row = 0; row < 6; row += 1) {
        const rowEl = document.createElement("div");
        rowEl.className = "row";
        const isCurrent = row === state.guesses.length;
        const guessStr = isCurrent ? state.currentGuess : (state.guesses[row] || "");
        const scores = state.guesses[row] ? getGuessResult(state.guesses[row], state.targetWord) : Array(5).fill("empty");

        for (let col = 0; col < 5; col += 1) {
          const char = guessStr[col] || "";
          const score = scores[col];
          const cell = document.createElement("div");
          cell.className = "cell";
          if (char && score === "empty") cell.classList.add("filled");
          if (score !== "empty") cell.classList.add(score);
          if (score !== "wasted") cell.textContent = char;
          rowEl.appendChild(cell);
        }
        gridEl.appendChild(rowEl);
      }
    }

    function renderKeyboard() {
      keyboardEl.innerHTML = "";
      const statuses = letterStatuses();
      for (const row of KEYBOARD_ROWS) {
        const rowEl = document.createElement("div");
        rowEl.className = "kbd-row";
        for (const key of row) {
          const button = document.createElement("button");
          const status = statuses[key.toLowerCase()];
          button.className = "key";
          if (key === "Enter" || key === "Backspace" || key === "Hint") button.classList.add("large");
          if (key === "Hint") button.classList.add("hint");
          if (status === "green" || status === "yellow" || status === "gray") button.classList.add(status);
          button.textContent = key === "Backspace" ? "DEL" : key;
          button.disabled = state.loading || state.gameStatus !== "playing";
          button.addEventListener("click", () => onKeyPress(key));
          rowEl.appendChild(button);
        }
        keyboardEl.appendChild(rowEl);
      }
    }

    function renderListButtons() {
      listButtonsEl.innerHTML = "";
      const all = [{ key: "standard", label: "STANDARD" }, ...EXTERNAL_LISTS.map(name => ({ key: name, label: formatListLabel(name) }))];
      for (const item of all) {
        const button = document.createElement("button");
        button.textContent = item.label;
        if (state.listType === item.key) button.classList.add("active");
        button.addEventListener("click", () => setListType(item.key));
        listButtonsEl.appendChild(button);
      }
    }

    function render() {
      renderListButtons();
      renderGrid();
      renderKeyboard();
      updateOverlay();
      resetBtn.disabled = state.loading;
      if (state.loading) statusEl.textContent = "Loading list...";
    }

    function initNewGame() {
      const words = activeList();
      if (!words.length) return;
      state.targetWord = words[Math.floor(Math.random() * words.length)];
      state.guesses = [];
      state.currentGuess = "";
      state.gameStatus = "playing";
      state.hintCount = 0;
      state.countdown = null;
      clearInterval(state.countdownTimer);
      state.countdownTimer = null;
      showMessage("");
      render();
    }

    async function loadListFile(filename) {
      state.loading = true;
      render();
      try {
        const response = await fetch(`lists/${filename}`);
        if (!response.ok) throw new Error("Missing word list");
        const text = await response.text();
        const words = text
          .split(/[\s\n\r]+/)
          .map(item => item.trim().toLowerCase())
          .filter(item => /^[a-z]{5}$/.test(item));
        if (!words.length) throw new Error("No valid words in list");
        state.cachedLists[filename] = words;
        showMessage(`${formatListLabel(filename)} loaded`);
      } catch (error) {
        console.error(error);
        state.listType = "standard";
        showMessage(`Error loading ${filename}. Using STANDARD.`);
      } finally {
        state.loading = false;
        initNewGame();
      }
    }

    function checkWinLoss(lastGuess) {
      if (lastGuess === state.targetWord) {
        state.gameStatus = "won";
        state.countdown = 5;
      } else if (state.guesses.length >= 6) {
        state.gameStatus = "lost";
        state.countdown = 5;
      }

      if (state.countdown !== null) {
        clearInterval(state.countdownTimer);
        state.countdownTimer = setInterval(() => {
          state.countdown -= 1;
          if (state.countdown <= 0) {
            clearInterval(state.countdownTimer);
            state.countdownTimer = null;
            initNewGame();
            return;
          }
          render();
        }, 1000);
      }
    }

    function onHint() {
      if (state.gameStatus !== "playing" || state.loading) return;

      const knownGreens = Array(5).fill(false);
      state.guesses.forEach(guess => {
        if (guess === "_____") return;
        for (let index = 0; index < 5; index += 1) {
          if (guess[index] === state.targetWord[index]) knownGreens[index] = true;
        }
      });

      const unknown = knownGreens.map((known, index) => (known ? -1 : index)).filter(index => index >= 0);
      if (!unknown.length) {
        showMessage("Correct positions known!");
        return;
      }

      const rowsRequired = 1 + state.hintCount;
      if (state.guesses.length + rowsRequired >= 6) {
        showMessage("Hint would end the game!");
        return;
      }

      const position = unknown[Math.floor(Math.random() * unknown.length)];
      const letter = state.targetWord[position];
      const hintWords = activeList().filter(word => word[position] === letter);
      if (!hintWords.length) {
        showMessage("No valid hint available.");
        return;
      }

      const hintWord = hintWords[Math.floor(Math.random() * hintWords.length)];
      state.guesses.push(hintWord);
      for (let count = 0; count < state.hintCount; count += 1) state.guesses.push("_____");
      state.hintCount += 1;
      state.currentGuess = "";
      showMessage(`Hint used ${rowsRequired} row(s)`);
      checkWinLoss(hintWord);
      render();
    }

    function onKeyPress(key) {
      if (state.gameStatus !== "playing" || state.loading) return;

      if (key === "Hint") {
        onHint();
        return;
      }

      if (key === "Backspace") {
        state.currentGuess = state.currentGuess.slice(0, -1);
        renderGrid();
        return;
      }

      if (key === "Enter") {
        if (state.currentGuess.length !== 5) {
          showMessage("Not enough letters");
          return;
        }
        if (!activeList().includes(state.currentGuess)) {
          showMessage("Word not in list");
          return;
        }
        state.guesses.push(state.currentGuess);
        const submitted = state.currentGuess;
        state.currentGuess = "";
        checkWinLoss(submitted);
        render();
        return;
      }

      if (/^[a-zA-Z]$/.test(key) && state.currentGuess.length < 5) {
        state.currentGuess += key.toLowerCase();
        renderGrid();
      }
    }

    function setListType(type) {
      if (state.loading || state.listType === type) return;
      state.listType = type;
      renderListButtons();
      if (type !== "standard" && !state.cachedLists[type]) {
        loadListFile(type);
      } else {
        initNewGame();
      }
    }

    document.addEventListener("keydown", event => {
      if (event.ctrlKey || event.metaKey || event.altKey) return;
      onKeyPress(event.key);
    });

    resetBtn.addEventListener("click", initNewGame);

    render();
    initNewGame();
  </script>
</body>
</html>
